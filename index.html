<head>

content="width=device-width, initial-scale=1.0">

<title>

</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="style.css">

</head>

<body>

<header>

    <div class="container header-container">

        <a href="#" class="logo">

            AURELIUS

        </a>

        <nav>

            <a href="#journey">Journey</a>

            <a href="#companies">Companies</a>

            <a href="#journal">Journal</a>

            <a href="#legacy">Legacy</a>

            <a href="#contact">Contact</a>

        </nav>

        <a href="#contact" class="header-btn">

            PRIVATE MEETING

        </a>

        <div class="menu-toggle">

            <span></span>

            <span></span>

        </div>

    </div>

</header>


<!-- HERO -->

<section class="hero" id="home">

    <!-- VIDEO -->

    <video
        class="hero-video"
        autoplay
        muted
        loop
        playsinline>

        <source
            src="video/hero.mp4"
            type="video/mp4">

    </video>

    <!-- OVERLAY -->

    <div class="hero-overlay"></div>

    <!-- CONTENT -->

    <div class="container">

        <div class="hero-content">

            <!-- LABEL -->

            <span class="hero-label">

                PRIVATE CAPITAL • DESIGN • LEGACY

            </span>

            <!-- DIVIDER -->

            <div class="hero-divider"></div>

            <!-- TITLE -->

            <h1>

                BUILDING<br>

                THINGS THAT<br>

                OUTLIVE ME.

            </h1>

            <!-- PRINCIPLES -->

            <div class="hero-principles">

                <span>Businesses.</span>

                <span>Ideas.</span>

                <span>People.</span>

                <span>Legacy.</span>

            </div>

            <!-- DESCRIPTION -->

            <p class="hero-description">

                The future isn't inherited.

                It's designed.

            </p>

            <!-- CTA -->

            <a
                href="#journey"
                class="hero-link">

                BEGIN THE JOURNEY

                <span>→</span>

            </a>

        </div>

    </div>

    <!-- SCROLL -->

    <div class="scroll-indicator">

        <span></span>

    </div>

    </section>

    

<script src="script.js"></script>
